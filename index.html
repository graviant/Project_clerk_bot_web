<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация задания</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <form id="registrationForm" class="form">
            <h2>Регистрация задания</h2>
            
            <div class="form-group">
                <label for="taskDate">Дата задания</label>
                <input type="text" id="taskDate" readonly>
            </div>
            
            <div class="form-group">
                <label for="deadline">Срок сдачи</label>
                <input type="text" id="deadline" required>
            </div>
            
            <div class="form-group">
                <label for="projectName">Название проекта</label>
                <input type="text" id="projectName" required>
            </div>
            
            <div class="form-group">
                <label for="customer">Заказчик</label>
                <input type="text" id="customer" required>
            </div>
            
            <div class="form-group">
                <label for="authorTz">Автор ТЗ</label>
                <input type="text" id="authorTz" required>
            </div>
            
            <div class="form-group">
                <label for="cardCount">Количество карточек</label>
                <input type="number" id="cardCount" required min="1">
            </div>
            
            <button type="submit" class="submit-btn">Отправить</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
